# Pyramide Media — nginx vhost (HTTPS)
# Prerequisites:
#   1. DNS A records for pyramidemedia.com and www → VPS IP (2.24.119.88)
#   2. Issue cert (HTTP vhost must serve /.well-known — see pyramidemedia-http on server):
#        certbot certonly --webroot -w /var/www/html \
#          -d pyramidemedia.com -d www.pyramidemedia.com
#   3. Install this file:
#        cp deploy/nginx-pyramidemedia.conf /etc/nginx/sites-available/pyramidemedia
#        ln -sf /etc/nginx/sites-available/pyramidemedia /etc/nginx/sites-enabled/pyramidemedia
#        rm -f /etc/nginx/sites-enabled/pyramidemedia-http
#        nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name pyramidemedia.com www.pyramidemedia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://pyramidemedia.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pyramidemedia.com;

    ssl_certificate /etc/letsencrypt/live/pyramidemedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyramidemedia.com/privkey.pem;

    return 301 https://pyramidemedia.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pyramidemedia.com;

    ssl_certificate /etc/letsencrypt/live/pyramidemedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyramidemedia.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
