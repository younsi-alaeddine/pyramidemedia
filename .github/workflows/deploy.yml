name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            export DEPLOY_PATH=/var/www/pyramidemedia
            cd "$DEPLOY_PATH" || git clone git@github.com:younsi-alaeddine/pyramidemedia.git "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout main
            git pull origin main
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
